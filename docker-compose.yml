version: "3.9"

services:
  sovereign-omega:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEPLOYER_PRIVATE_KEY=${DEPLOYER_PRIVATE_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - PHAROS_NETWORK=${PHAROS_NETWORK:-testnet}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sovereign_omega
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_only_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sovereign"]
      interval: 5s
      retries: 5

volumes:
  postgres_data:
